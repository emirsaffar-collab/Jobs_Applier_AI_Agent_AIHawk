# Your LLM API key. Get one from your chosen provider:
#
#   Anthropic (Claude): https://console.anthropic.com/settings/keys
#   OpenAI (GPT):       https://platform.openai.com/api-keys
#   Google (Gemini):    https://aistudio.google.com/apikey
#   Hugging Face:       https://huggingface.co/settings/tokens
#   Perplexity:         https://www.perplexity.ai/settings/api
#   Ollama (local):     No key needed — install from https://ollama.ai
#
# Set the provider with LLM_MODEL_TYPE env var (default: claude).
llm_api_key: 'your-api-key-here'

# CAPSolver API key for automatic CAPTCHA solving (hCaptcha, reCAPTCHA, Turnstile).
# Sign up at https://www.capsolver.com/ to get a key. Leave empty to disable.
capsolver_api_key: ''

# Proxy list for IP rotation (one per line). Format: protocol://[user:pass@]host:port
# Leave empty to disable proxy rotation.
proxies:
  # - "http://user:pass@proxy1.example.com:8080"
  # - "http://proxy2.example.com:8080"
