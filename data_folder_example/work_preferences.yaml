remote: true
hybrid: true
onsite: true

experience_level:
  internship: false
  entry: true
  associate: true
  mid_senior_level: true
  director: false
  executive: false

job_types:
  full_time: true
  contract: false
  part_time: false
  temporary: true
  internship: false
  other: false
  volunteer: true

date:
  all_time: false
  month: false
  week: false
  24_hours: true

positions:
  - Software engineer

locations:
  - Germany

apply_once_at_company: true

distance: 100

company_blacklist:
  - wayfair
  - Crossover

title_blacklist:
  - word1
  - word2

location_blacklist:
  - Brazil

# --- Salary Filter ---
# Set min/max annual salary to filter jobs. 0 = no filter.
salary:
  min: 0          # Minimum annual salary (0 = no filter)
  max: 0          # Maximum annual salary (0 = no filter)
  currency: "USD"

# --- Optional Tuning Parameters ---
# These can also be set via environment variables (env vars take precedence).
# Minimum job fit score (1-10) to auto-apply. Lower = more applications, less targeted.
min_suitability_score: 7
# Maximum applications per bot run
max_applications: 50
# Seconds to wait between applications (helps avoid detection)
wait_between_applications: 60

# --- Recruiter Outreach ---
# Send personalised messages to recruiters/hiring managers after applying (LinkedIn only).
recruiter_outreach:
  enabled: false
  daily_limit: 20
  message_style: "professional"   # professional | casual | brief

# --- Per-Platform Rate Limits ---
# Maximum applications per 24-hour window per platform.
# Keeps you under detection thresholds. Missing platforms use 'default'.
rate_limits:
  linkedin: 100
  indeed: 80
  glassdoor: 50
  ziprecruiter: 60
  dice: 60
  default: 80
  cooldown_minutes: 5   # minimum pause between applications (minutes)

